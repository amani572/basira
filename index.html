<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بصيرة الذكي | OCR Project</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>

<div class="app-container">

    <!-- الكاميرا -->
    <div class="video-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <!-- اختيار اللغة -->
    <div class="lang-box">
        <label>
            <input type="radio" name="lang" value="eng" checked>
            English
        </label>

        <label>
            <input type="radio" name="lang" value="ara">
            العربية
        </label>
    </div>

    <!-- أزرار التحكم الأساسية -->
    <div class="buttons-container">

        <button id="captureBtn" class="btn-scan" disabled>
            التقاط 🔍
            <br>
            وقراءة النص
        </button>

        <button id="startCamBtn" class="btn-cam">
            تشغيل 🎥
            <br>
            الكاميرا
        </button>

        <button id="stopCamBtn" class="btn-stop">
            إيقاف ⛔
            <br>
            الكاميرا
        </button>

    </div>

    <!-- أدوات المساعدة -->
    <div class="buttons-container">

        <button id="readPageBtn" class="btn-read">
            🔊
            <br>
            قراءة الصفحة
        </button>

        <button id="voiceBtn" class="btn-voice">
            🎤
            <br>
            أوامر صوتية
        </button>

    </div>

    <!-- تكبير وتصغير النص -->
    <div class="buttons-container">

        <button id="increaseFontBtn" class="btn-size">
            ➕
            <br>
            تكبير النص
        </button>

        <button id="decreaseFontBtn" class="btn-size">
            ➖
            <br>
            تصغير النص
        </button>

    </div>

    <!-- طوارئ -->
    <div class="buttons-container">

        <a href="tel:911" class="btn-emergency">
            🚨
            <br>
            طوارئ
        </a>

    </div>

    <!-- شريط التقدم -->
    <div id="progressContainer"
         class="progress-container"
         style="display:none;">

        <div id="progressBar"
             class="progress-bar">
            0%
        </div>

    </div>

    <!-- النتائج -->
    <div class="result-box">

        <div class="result-header">

            <h3>النص المقروء:</h3>

            <button id="copyBtn"
                    class="btn-copy"
                    style="display:none;">
                نسخ النص 📋
            </button>

        </div>

        <p id="statusField">
            اضغط على تشغيل الكاميرا للبدء...
        </p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
