<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بصيرة PRO | منصة المساعدة الشاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-eye-low-vision logo-icon"></i>
            <span>بصيرة <span class="badge">PRO</span></span>
        </div>
    </nav>

    <div class="app-container">
        
        <button id="sosBtn" class="main-card emergency-card">
            <div class="card-icon"><i class="fa-solid fa-phone-coronary"></i><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h2>نداء طوارئ (SOS)</h2>
            <p>اضغط هنا لطلب المساعدة الفورية ونطق موقعك</p>
        </button>

        <button id="locationBtn" class="main-card map-card">
            <div class="card-icon"><i class="fa-solid fa-map-location-dot"></i></div>
            <h2>أين أنا الآن؟</h2>
            <p>اضغط لمعرفة موقعك الجغرافي الحالي صوتياً</p>
        </button>

        <section class="status-card">
            <div class="card-header">
                <i class="fa-solid fa-volume-high"></i>
                <h3>المساعد الصوتي للمشروع</h3>
            </div>
            <div class="output-box">
                <p id="statusField">مرحباً بك في منصة بصيرة. انقر على أي زر للاستماع والتشغيل.</p>
            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
